name: Run Linters

on:
    pull_request:
      branches: [ main ]
    push:
      branches: [ main ]

jobs:
  lint-python:
    # Use flake8 to lint Python code
    name: Lint Python
    runs-on: ubuntu-latest

    steps:
    - name: Check out the code
      uses: actions/checkout@v3

    - name: Set up Python environment
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"
        cache: "pip"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8

    - name: Run flake8
      run: |
        flake8 task/

  lint-js:
    # Use ESLint to lint JavaScript code (within the ui/ directory)
    name: Lint JavaScript
    runs-on: ubuntu-latest

    steps:
    - name: Check out the code
      uses: actions/checkout@v3

    - name: Set up Node.js environment
      uses: actions/setup-node@v3
      with:
        node-version: "18"
        cache: "npm"

    - name: Install dependencies
      run: |
        npm install --include=dev

    - name: Run ESLint
      run: |
        npx eslint . --ext .js --max-warnings 0

  lint-css:
    # Use stylelint to lint CSS code
    name: Lint CSS
    runs-on: ubuntu-latest

    steps:
    - name: Check out the code
      uses: actions/checkout@v3

    - name: Set up Node.js environment
      uses: actions/setup-node@v3
      with:
        node-version: "18"
        cache: "npm"

    - name: Install dependencies
      run: |
        npm install

    - name: Run stylelint
      run: |
        npx stylelint "**/*.css" --fix --allow-empty-input

  lint-sql:
    # Use sqlfluff to lint SQL code
    name: Lint SQL
    runs-on: ubuntu-latest

    steps:
    - name: Check out the code
      uses: actions/checkout@v3

    - name: Set up Python environment
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"
        cache: "pip"
        cache-dependency-path: requirements.txt

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install sqlfluff

    - name: Run sqlfluff
      run: |
        sqlfluff lint --dialect bigquery