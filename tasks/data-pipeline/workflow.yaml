main:
  steps:
    - extract_properties:
        call: http.get
        args:
          url: "https://us-east4-musa5090s26-team6.cloudfunctions.net/extract-opa-properties"
          auth:
            type: OIDC
          timeout: 540

    - prepare_properties:
        call: http.get
        args:
          url: "https://us-east4-musa5090s26-team6.cloudfunctions.net/prepare-opa-properties"
          auth:
            type: OIDC
          timeout: 540

    - load_properties:
        call: http.get
        args:
          url: "https://us-east4-musa5090s26-team6.cloudfunctions.net/load-opa-properties"
